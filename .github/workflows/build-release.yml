name: Build Release Bundle

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: com.mua.prayertracker
      PLAY_TRACK: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate required secrets
        env:
          PRAYER_TRACKER_JKS: ${{ secrets.PRAYER_TRACKER_JKS }}
          PRAYER_TRACKER_KEY_ALIAS: ${{ secrets.PRAYER_TRACKER_KEY_ALIAS }}
          PRAYER_TRACKER_KEY_PASSWORD: ${{ secrets.PRAYER_TRACKER_KEY_PASSWORD }}
          PRAYER_TRACKER_STORE_PASSWORD: ${{ secrets.PRAYER_TRACKER_STORE_PASSWORD }}
          PRAYER_TRACKER_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PRAYER_TRACKER_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail

          required_secrets=(
            PRAYER_TRACKER_JKS
            PRAYER_TRACKER_KEY_ALIAS
            PRAYER_TRACKER_KEY_PASSWORD
            PRAYER_TRACKER_STORE_PASSWORD
          )

          missing=()
          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.action }}" = "published" ]; then
            if [ -z "${PRAYER_TRACKER_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
              echo "Missing required secret for release publish: PRAYER_TRACKER_PLAY_SERVICE_ACCOUNT_JSON"
              exit 1
            fi
          fi

      - name: Decode and save keystore
        run: |
          mkdir -p secret
          echo "${{ secrets.PRAYER_TRACKER_JKS }}" | base64 -d > secret/key-store.jks

      - name: Clean project
        run: ./gradlew clean

      - name: Build release bundle
        run: |
          ./gradlew bundleRelease \
            -PPRAYER_TRACKER_STORE_PASSWORD="${{ secrets.PRAYER_TRACKER_STORE_PASSWORD }}" \
            -PPRAYER_TRACKER_KEY_ALIAS="${{ secrets.PRAYER_TRACKER_KEY_ALIAS }}" \
            -PPRAYER_TRACKER_KEY_PASSWORD="${{ secrets.PRAYER_TRACKER_KEY_PASSWORD }}"

      - name: Verify bundle signature
        run: jarsigner -verify -verbose -certs app/build/outputs/bundle/release/app-release.aab

      - name: Decode Play service account (release only)
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PRAYER_TRACKER_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret: PRAYER_TRACKER_PLAY_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

          mkdir -p secret
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          raw = os.environ["PLAY_SERVICE_ACCOUNT_JSON"].strip()
          output_path = Path("secret/play-service-account.json")

          try:
              parsed = json.loads(raw)
              output_path.write_text(json.dumps(parsed), encoding="utf-8")
          except json.JSONDecodeError:
              decoded = base64.b64decode(raw).decode("utf-8")
              parsed = json.loads(decoded)
              output_path.write_text(json.dumps(parsed), encoding="utf-8")
          PY

      - name: Publish to Google Play (release only)
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        run: |
          set -euo pipefail

          log() {
            printf '[publish] %s\n' "$*"
          }

          log "starting google play publish flow"

          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          SERVICE_ACCOUNT_FILE="secret/play-service-account.json"

          log "checking bundle path: $AAB_PATH"
          if [ ! -f "$AAB_PATH" ]; then
            echo "AAB not found at $AAB_PATH"
            exit 1
          fi

          log "checking service account file: $SERVICE_ACCOUNT_FILE"
          if [ ! -f "$SERVICE_ACCOUNT_FILE" ]; then
            echo "Service account file not found at $SERVICE_ACCOUNT_FILE"
            exit 1
          fi

          log "building jwt assertion inputs"
          # Build and sign a JWT assertion for OAuth 2.0 service-account flow.
          python3 - <<'PY'
          import base64
          import json
          import time
          from pathlib import Path

          service_account = json.loads(Path("secret/play-service-account.json").read_text(encoding="utf-8"))
          now = int(time.time())

          def b64url(data: bytes) -> str:
              return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")

          header = {"alg": "RS256", "typ": "JWT"}
          payload = {
              "iss": service_account["client_email"],
              "scope": "https://www.googleapis.com/auth/androidpublisher",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now,
              "exp": now + 3600,
          }

          unsigned_jwt = (
              f"{b64url(json.dumps(header, separators=(',', ':')).encode('utf-8'))}."
              f"{b64url(json.dumps(payload, separators=(',', ':')).encode('utf-8'))}"
          )

          Path("secret/unsigned-jwt.txt").write_text(unsigned_jwt, encoding="utf-8")
          Path("secret/service-account-private-key.pem").write_text(
              service_account["private_key"],
              encoding="utf-8",
          )
          PY

          log "signing jwt assertion with openssl"
          UNSIGNED_JWT="$(cat secret/unsigned-jwt.txt)"
          JWT_SIGNATURE="$(printf '%s' "$UNSIGNED_JWT" | openssl dgst -sha256 -sign secret/service-account-private-key.pem | openssl base64 -A | tr '+/' '-_' | tr -d '=')"
          JWT_ASSERTION="$UNSIGNED_JWT.$JWT_SIGNATURE"

          log "requesting oauth access token"
          TOKEN_RESPONSE_FILE="secret/token-response.json"
          TOKEN_STATUS_FILE="secret/token-status.txt"
          curl -sS -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            --data-urlencode "assertion=$JWT_ASSERTION" \
            -o "$TOKEN_RESPONSE_FILE" \
            -w '%{http_code}' \
            https://oauth2.googleapis.com/token | tee "$TOKEN_STATUS_FILE"

          TOKEN_HTTP_STATUS="$(cat "$TOKEN_STATUS_FILE")"
          log "oauth token http status: $TOKEN_HTTP_STATUS"
          log "oauth token response body: $(tr '\n' ' ' < "$TOKEN_RESPONSE_FILE")"

          if [ "$TOKEN_HTTP_STATUS" != "200" ]; then
            echo "Failed to obtain Google OAuth access token"
            exit 1
          fi

          ACCESS_TOKEN="$(python3 -c 'import json,sys; print(json.loads(open("secret/token-response.json", encoding="utf-8").read()).get("access_token", ""))')"
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to obtain Google OAuth access token"
            exit 1
          fi

          log "oauth access token received"

          log "creating play edit"
          CREATE_EDIT_RESPONSE_FILE="secret/create-edit-response.json"
          CREATE_EDIT_STATUS_FILE="secret/create-edit-status.txt"
          curl -sS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -o "$CREATE_EDIT_RESPONSE_FILE" \
            -w '%{http_code}' \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits" | tee "$CREATE_EDIT_STATUS_FILE"

          CREATE_EDIT_HTTP_STATUS="$(cat "$CREATE_EDIT_STATUS_FILE")"
          log "create edit http status: $CREATE_EDIT_HTTP_STATUS"
          log "create edit response body: $(tr '\n' ' ' < "$CREATE_EDIT_RESPONSE_FILE")"

          if [ "$CREATE_EDIT_HTTP_STATUS" != "200" ]; then
            echo "Failed to create Play edit"
            exit 1
          fi

          EDIT_ID="$(python3 -c 'import json,sys; print(json.loads(open("secret/create-edit-response.json", encoding="utf-8").read()).get("id", ""))')"
          if [ -z "$EDIT_ID" ]; then
            echo "Failed to create Play edit"
            exit 1
          fi

          log "play edit id: $EDIT_ID"

          log "uploading bundle to play edit"
          UPLOAD_RESPONSE_FILE="secret/upload-response.json"
          UPLOAD_STATUS_FILE="secret/upload-status.txt"
          curl -sS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$AAB_PATH" \
            -o "$UPLOAD_RESPONSE_FILE" \
            -w '%{http_code}' \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/bundles?uploadType=media" | tee "$UPLOAD_STATUS_FILE"

          UPLOAD_HTTP_STATUS="$(cat "$UPLOAD_STATUS_FILE")"
          log "upload bundle http status: $UPLOAD_HTTP_STATUS"
          log "upload bundle response body: $(tr '\n' ' ' < "$UPLOAD_RESPONSE_FILE")"

          if [ "$UPLOAD_HTTP_STATUS" != "200" ]; then
            echo "Failed to upload bundle to Play edit"
            exit 1
          fi

          VERSION_CODE="$(python3 -c 'import json,sys; print(json.loads(open("secret/upload-response.json", encoding="utf-8").read()).get("versionCode", ""))')"
          if [ -z "$VERSION_CODE" ]; then
            echo "Failed to upload bundle to Play edit"
            exit 1
          fi
          log "uploaded bundle version code: $VERSION_CODE"

          export VERSION_CODE

          log "building track payload"
          TRACK_PAYLOAD="$(python3 - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "releases": [
                          {
                              "status": "completed",
                              "versionCodes": [os.environ["VERSION_CODE"]],
                          }
                      ]
                  }
              )
          )
          PY
          )"

          log "updating play track: $PLAY_TRACK"
          TRACK_RESPONSE_FILE="secret/track-response.json"
          TRACK_STATUS_FILE="secret/track-status.txt"
          curl -sS -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$TRACK_PAYLOAD" \
            -o "$TRACK_RESPONSE_FILE" \
            -w '%{http_code}' \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/tracks/$PLAY_TRACK" | tee "$TRACK_STATUS_FILE"

          TRACK_HTTP_STATUS="$(cat "$TRACK_STATUS_FILE")"
          log "track update http status: $TRACK_HTTP_STATUS"
          log "track update response body: $(tr '\n' ' ' < "$TRACK_RESPONSE_FILE")"

          if [ "$TRACK_HTTP_STATUS" != "200" ]; then
            echo "Failed to update Play track"
            exit 1
          fi

          log "committing play edit"
          COMMIT_RESPONSE_FILE="secret/commit-response.json"
          COMMIT_STATUS_FILE="secret/commit-status.txt"
          curl -sS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -o "$COMMIT_RESPONSE_FILE" \
            -w '%{http_code}' \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID:commit" | tee "$COMMIT_STATUS_FILE"

          COMMIT_HTTP_STATUS="$(cat "$COMMIT_STATUS_FILE")"
          log "commit edit http status: $COMMIT_HTTP_STATUS"
          log "commit edit response body: $(tr '\n' ' ' < "$COMMIT_RESPONSE_FILE")"

          if [ "$COMMIT_HTTP_STATUS" != "200" ]; then
            echo "Failed to commit Play edit"
            exit 1
          fi

          log "google play publish flow completed successfully"

          # Best effort cleanup for generated credential material.
          rm -f secret/unsigned-jwt.txt secret/service-account-private-key.pem secret/play-service-account.json \
            secret/token-response.json secret/token-status.txt \
            secret/create-edit-response.json secret/create-edit-status.txt \
            secret/upload-response.json secret/upload-status.txt \
            secret/track-response.json secret/track-status.txt \
            secret/commit-response.json secret/commit-status.txt
